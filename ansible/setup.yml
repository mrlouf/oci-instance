---
# ─────────────────────────────────────────────────────────────────────────────
# setup.yml — Installation Nginx + Certbot + configuration HTTPS
# Usage : ansible-playbook -i inventory.ini setup.yml
# ─────────────────────────────────────────────────────────────────────────────

- name: Setup portfolio server
  hosts: portfolio
  become: true
  vars_files:
    - vars.yml

  tasks:

    # ── Système ──────────────────────────────────────────────────────────────

    - name: Mise à jour des paquets
      apt:
        update_cache: yes
        upgrade: safe
        cache_valid_time: 3600

    - name: Installation de Nginx et Certbot
      apt:
        name:
          - nginx
          - certbot
          - python3-certbot-nginx
        state: present

    # ── Dossier du site ──────────────────────────────────────────────────────

    - name: Création du dossier du portfolio
      file:
        path: "{{ remote_site_path }}"
        state: directory
        owner: www-data
        group: www-data
        mode: "0755"

    - name: Création du dossier du bingo
      file:
        path: "{{ remote_bingo_path }}"
        state: directory
        owner: www-data
        group: www-data
        mode: "0755"

    # ── Config Nginx (HTTP d'abord, Certbot s'occupe du HTTPS) ───────────────

    - name: Copie de la config Nginx pour le site portfolio
      template:
        src: templates/nginx.conf.mrlouf.j2
        dest: "{{ domain_nginx_config_path }}"
        mode: "0644"
      notify: Reload Nginx

    - name: Copie de la config Nginx pour bingo.casa
      template:
        src: templates/nginx.conf.bingo.j2
        dest: "{{ bingo_nginx_config_path }}"
        mode: "0644"
      notify: Reload Nginx

    - name: Activation du site portfolio
      file:
        src: "{{ domain_nginx_config_path }}"
        dest: "/etc/nginx/sites-enabled/portfolio"
        state: link
      notify: Reload Nginx

    - name: Activation du site bingo
      file:
        src: "{{ bingo_nginx_config_path }}"
        dest: "/etc/nginx/sites-enabled/bingo"
        state: link
      notify: Reload Nginx

    - name: Suppression du site par défaut Nginx
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload Nginx

    - name: Test de la config Nginx
      command: nginx -t
      changed_when: false

    - name: Démarrage et activation de Nginx
      service:
        name: nginx
        state: started
        enabled: yes
    
    - name: Appliquer immédiatement les changements Nginx avant Certbot
      meta: flush_handlers

    # ── Certbot HTTPS ────────────────────────────────────────────────────────

    - name: Obtention du certificat Let's Encrypt pour mrlouf.com
      command: >
        certbot --nginx
        -d {{ domain_name }}
        -d www.{{ domain_name }}
        --non-interactive
        --agree-tos
        --email {{ certbot_email }}
        --redirect
      args:
        creates: /etc/letsencrypt/live/{{ domain_name }}/fullchain.pem

    - name: Obtention du certificat pour bingos.casa
      command: >
        certbot --nginx
        -d {{ bingo_domain }}
        -d www.{{ bingo_domain }}
        --non-interactive
        --agree-tos
        --email {{ certbot_email }}
        --redirect
      args:
        creates: /etc/letsencrypt/live/{{ bingo_domain }}/fullchain.pem

    - name: Vérification Nginx après modifications Certbot
      command: nginx -t
      changed_when: false

    - name: Rechargement Nginx après Certbot
      service:
        name: nginx
        state: reloaded

    # ── Renouvellement auto ──────────────────────────────────────────────────

    - name: Cron de renouvellement Certbot (2x par jour, standard Let's Encrypt)
      cron:
        name: "Certbot renewal"
        minute: "0"
        hour: "3,15"
        job: "certbot renew --quiet && systemctl reload nginx"
        user: root

  handlers:
    - name: Reload Nginx
      service:
        name: nginx
        state: reloaded
