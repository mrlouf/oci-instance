name: Deploy portfolio

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Install Ansible
        run: pip install ansible

      - name: Deploy
        run: |
          echo "${{ secrets.SERVER_IP }} ansible_user=ubuntu" > inventory_ci.ini
          ansible-playbook -i inventory_ci.ini ansible/deploy.yml
