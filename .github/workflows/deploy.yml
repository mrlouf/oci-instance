name: Deploy portfolio

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Install Ansible
        run: pip install ansible

      - name: Deploy
        run: |
          echo "[portfolio]" > inventory_ci.ini
          echo "portfolio-server ansible_host=${{ secrets.SERVER_IP }}" >> inventory_ci.ini
          echo "ansible_user=ubuntu" >> inventory_ci.ini
          echo "[portfolio:vars]" >> inventory_ci.ini
          echo "ansible_ssh_private_key_file=~/.ssh/id_ed25519" >> inventory_ci.ini
          echo "ansible_ssh_common_args='-o StrictHostKeyChecking=no'" >> inventory_ci.ini
          ansible-playbook -i inventory_ci.ini ansible/deploy.yml
